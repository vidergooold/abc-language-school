name: Close Duplicate PRs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  close-prs:
    runs-on: ubuntu-latest
    # One-time cleanup: closes duplicate/superseded PRs that were opened before PR #40–42
    steps:
      - name: Comment and close duplicate/superseded PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBERS="44 43 39 38 37 36 35 33 32 31 30 28 27 26 25 23 22 21 20 19 18 17"
          for PR in $PR_NUMBERS; do
            echo "Processing PR #$PR..."
            # Skip PRs that are already closed
            STATE=$(gh api "/repos/$REPO/pulls/$PR" --jq '.state' 2>/dev/null || echo "unknown")
            if [ "$STATE" != "open" ]; then
              echo "PR #$PR is already $STATE, skipping."
              continue
            fi
            # Add comment
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/$REPO/issues/$PR/comments" \
              -f body="Closing as duplicate or superseded" || echo "Failed to comment on #$PR"
            # Close the PR
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/$REPO/pulls/$PR" \
              -f state="closed" || echo "Failed to close #$PR"
            echo "Done with PR #$PR"
          done
