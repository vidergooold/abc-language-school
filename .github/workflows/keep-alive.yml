name: Keep Railway Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://abc-language-school-production.up.railway.app/ \
            --max-time 30
          echo " - Backend pinged successfully"
